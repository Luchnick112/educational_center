services:
  db:
    image: postgres:17-alpine
    container_name: educational_center_dev_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-educational_center}
      POSTGRES_USER: ${POSTGRES_USER:-educational_center}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-educational_center}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - educational_center_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-educational_center} -d ${POSTGRES_DB:-educational_center}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  educational_center_dev_pgdata:
