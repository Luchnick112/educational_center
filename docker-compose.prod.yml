services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    volumes:
      - educational_center_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - educational_center_static:/app/staticfiles

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - educational_center_static:/staticfiles:ro

volumes:
  educational_center_prod_pgdata:
  educational_center_static:
