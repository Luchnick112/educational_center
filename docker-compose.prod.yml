services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    volumes:
      - educational_center_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - educational_center_static:/app/staticfiles

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.helper-lesson.net}
    restart: unless-stopped
    depends_on:
      - backend

  marketing:
    build:
      context: ./marketing
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - marketing
      - frontend
      - backend
    ports:
      - "${APP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - educational_center_static:/staticfiles:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  educational_center_prod_pgdata:
  educational_center_static:
  caddy_data:
  caddy_config:
