<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User</title>
    <style>
        :root {
            --bg: #f4efe4;
            --panel: rgba(255, 252, 246, 0.88);
            --ink: #1f2933;
            --muted: #52606d;
            --accent: #b8572f;
            --accent-dark: #8c3e1d;
            --line: rgba(31, 41, 51, 0.12);
            --ok: #1f7a5c;
            --error: #a61b1b;
            --shadow: 0 20px 60px rgba(31, 41, 51, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(184, 87, 47, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(31, 122, 92, 0.16), transparent 28%),
                linear-gradient(135deg, #f6f1e7 0%, #ebe0cf 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(960px, 100%);
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            border: 1px solid rgba(31, 41, 51, 0.08);
            border-radius: 28px;
            overflow: hidden;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero {
            padding: 56px 48px;
            background:
                linear-gradient(180deg, rgba(184, 87, 47, 0.92) 0%, rgba(130, 54, 24, 0.94) 100%);
            color: #fff8f0;
            position: relative;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -30px -30px auto;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 248, 240, 0.12);
        }

        .eyebrow {
            margin: 0 0 18px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-size: 12px;
            opacity: 0.82;
        }

        h1 {
            margin: 0 0 18px;
            font-size: clamp(2.4rem, 5vw, 4.2rem);
            line-height: 0.96;
            font-weight: 700;
        }

        .lead {
            margin: 0;
            max-width: 26rem;
            font-size: 1.05rem;
            line-height: 1.7;
            color: rgba(255, 248, 240, 0.82);
        }

        .roles {
            margin-top: 36px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .roles span {
            border: 1px solid rgba(255, 248, 240, 0.25);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.92rem;
            background: rgba(255, 248, 240, 0.08);
        }

        .panel {
            padding: 36px;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 7px;
            font-size: 0.92rem;
            color: var(--muted);
        }

        input,
        select,
        button {
            font: inherit;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.84);
            padding: 13px 14px;
            border-radius: 14px;
            color: var(--ink);
            transition: border-color 0.18s ease, transform 0.18s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        button {
            margin-top: 6px;
            border: 0;
            border-radius: 14px;
            padding: 15px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff8f0;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .status {
            min-height: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .status.ok {
            color: var(--ok);
        }

        .status.error {
            color: var(--error);
        }

        .hint {
            margin: 12px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .hint code {
            background: rgba(31, 41, 51, 0.06);
            padding: 2px 6px;
            border-radius: 6px;
        }

        @media (max-width: 820px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .hero,
            .panel {
                padding: 28px;
            }
        }

        @media (max-width: 560px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Educational Center</p>
            <h1>Create a new account</h1>
            <p class="lead">
                This page sends a JSON request to the existing registration API and shows the result directly in the browser.
            </p>
            <div class="roles">
                {% for value, label in roles %}
                    <span>{{ label }}</span>
                {% endfor %}
            </div>
        </section>

        <section class="panel">
            <form id="register-form">
                <div class="grid">
                    <label>
                        Role
                        <select name="role" required>
                            <option value="" selected disabled>Select role</option>
                            {% for value, label in roles %}
                                <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </label>
                    <label>
                        Email
                        <input type="email" name="email" required>
                    </label>
                </div>

                <div class="grid">
                    <label>
                        First name
                        <input type="text" name="first_name">
                    </label>
                    <label>
                        Last name
                        <input type="text" name="last_name">
                    </label>
                </div>
                <div class="grid">
                    <label>
                        Password
                        <input type="password" name="password" minlength="8" required>
                    </label>
                    <label>
                        Phone
                        <input type="text" name="phone">
                    </label>
                </div>

                <button type="submit">Register user</button>
                <div id="status" class="status" aria-live="polite"></div>
            </form>

            <p class="hint">
                API endpoint: <code>/api/users/register/</code>
            </p>
        </section>
    </main>

    <script>
        const form = document.getElementById('register-form');
        const statusNode = document.getElementById('status');

        function setStatus(message, type) {
            statusNode.textContent = message;
            statusNode.className = `status ${type}`;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const submitButton = form.querySelector('button[type="submit"]');
            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            submitButton.disabled = true;
            setStatus('Submitting registration...', '');

            try {
                const response = await fetch(window.location.pathname, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    const errors = Object.entries(data)
                        .map(([field, messages]) => `${field}: ${messages.join(', ')}`)
                        .join(' | ');
                    setStatus(errors || 'Registration failed.', 'error');
                    return;
                }

                form.reset();
                setStatus(`User ${data.email} created successfully with role ${data.role}.`, 'ok');
            } catch (error) {
                setStatus('Network error while sending request.', 'error');
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
