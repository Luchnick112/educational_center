<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        :root {
            --bg: #f4efe4;
            --panel: rgba(255, 252, 246, 0.88);
            --ink: #1f2933;
            --muted: #52606d;
            --accent: #b8572f;
            --accent-dark: #8c3e1d;
            --line: rgba(31, 41, 51, 0.12);
            --ok: #1f7a5c;
            --error: #a61b1b;
            --shadow: 0 20px 60px rgba(31, 41, 51, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(184, 87, 47, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(31, 122, 92, 0.16), transparent 28%),
                linear-gradient(135deg, #f6f1e7 0%, #ebe0cf 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(880px, 100%);
            display: grid;
            grid-template-columns: 1fr 0.92fr;
            border: 1px solid rgba(31, 41, 51, 0.08);
            border-radius: 28px;
            overflow: hidden;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .hero {
            padding: 48px;
            background: linear-gradient(180deg, rgba(184, 87, 47, 0.92) 0%, rgba(130, 54, 24, 0.94) 100%);
            color: #fff8f0;
        }

        .eyebrow {
            margin: 0 0 18px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-size: 12px;
            opacity: 0.82;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2.2rem, 4.2vw, 3.6rem);
            line-height: 0.98;
        }

        .lead {
            margin: 0;
            font-size: 1rem;
            line-height: 1.7;
            color: rgba(255, 248, 240, 0.82);
            max-width: 25rem;
        }

        .panel {
            padding: 36px;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 7px;
            font-size: 0.92rem;
            color: var(--muted);
        }

        input,
        button {
            font: inherit;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.84);
            padding: 13px 14px;
            border-radius: 14px;
            color: var(--ink);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            margin-top: 8px;
            border: 0;
            border-radius: 14px;
            padding: 15px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff8f0;
            cursor: pointer;
            font-weight: 700;
        }

        button:disabled {
            opacity: 0.72;
            cursor: wait;
        }

        .status {
            min-height: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .status.ok {
            color: var(--ok);
        }

        .status.error {
            color: var(--error);
        }

        .result {
            margin-top: 16px;
            border: 1px solid rgba(31, 41, 51, 0.08);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.58);
            padding: 14px;
            min-height: 140px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.88rem;
        }

        .hint {
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .hint code {
            background: rgba(31, 41, 51, 0.06);
            padding: 2px 6px;
            border-radius: 6px;
        }

        @media (max-width: 820px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .hero,
            .panel {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Educational Center</p>
            <h1>{{ page_title }}</h1>
            <p class="lead">{{ page_lead }}</p>
        </section>

        <section class="panel">
            <form id="auth-form">
                {% for field in fields %}
                    <label>
                        {{ field.label }}
                        <input
                            type="{{ field.type }}"
                            name="{{ field.name }}"
                            {% if field.required %}required{% endif %}
                        >
                    </label>
                {% endfor %}

                <button type="submit">{{ button_label }}</button>
                <div id="status" class="status" aria-live="polite"></div>
            </form>

            <pre id="result" class="result">Response body will appear here.</pre>
            <p class="hint">API endpoint: <code>{{ endpoint }}</code></p>
        </section>
    </main>

    {{ fields|json_script:"auth-fields" }}
    <script>
        const form = document.getElementById('auth-form');
        const statusNode = document.getElementById('status');
        const resultNode = document.getElementById('result');
        const fields = JSON.parse(document.getElementById('auth-fields').textContent);

        function setStatus(message, type) {
            statusNode.textContent = message;
            statusNode.className = `status ${type}`;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const submitButton = form.querySelector('button[type="submit"]');
            const formData = new FormData(form);
            const payload = {};

            fields.forEach((field) => {
                payload[field.name] = formData.get(field.name);
            });

            submitButton.disabled = true;
            resultNode.textContent = 'Waiting for response...';
            setStatus('Submitting request...', '');

            try {
                const response = await fetch(window.location.pathname, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                resultNode.textContent = JSON.stringify(data, null, 2);

                if (!response.ok) {
                    const errors = Object.entries(data)
                        .map(([field, messages]) => `${field}: ${messages.join(', ')}`)
                        .join(' | ');
                    setStatus(errors || 'Request failed.', 'error');
                    return;
                }

                setStatus('Request completed successfully.', 'ok');
            } catch (error) {
                resultNode.textContent = 'Network error while sending request.';
                setStatus('Network error while sending request.', 'error');
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
